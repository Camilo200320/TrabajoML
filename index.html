<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recomendación Cultivos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/favicon.ico">
</head>
<body>

<div class="container">
    <h2>Recomendación de Cultivo</h2>




<input type="number" id="N" placeholder="Nitrógeno">
<input type="number" id="P" placeholder="Fósforo">
<input type="number" id="K" placeholder="Potasio">
<input type="number" id="temperature" placeholder="Temperatura">
<input type="number" id="humidity" placeholder="Humedad">
<input type="number" id="ph" placeholder="pH">
<input type="number" id="rainfall" placeholder="Lluvia">

<button onclick="predict()">Predecir</button>

<div id="output" class="result"></div>


</div>

<script>
async function predict() {
    const output = document.getElementById("output");

    const data = {
        N: parseFloat(document.getElementById("N").value),
        P: parseFloat(document.getElementById("P").value),
        K: parseFloat(document.getElementById("K").value),
        temperature: parseFloat(document.getElementById("temperature").value),
        humidity: parseFloat(document.getElementById("humidity").value),
        ph: parseFloat(document.getElementById("ph").value),
        rainfall: parseFloat(document.getElementById("rainfall").value)
    };

    if (Object.values(data).some(v => isNaN(v))) {
        output.innerHTML = "<p class='error'>Completa todos los campos</p>";
        return;
    }


    // const url = "http://127.0.0.1:8000/predict/compare";
    const url = "https://trabajo-ml-v0yc.onrender.com";

    output.innerHTML = "<p class='loading'> ... </p>";


    //para probarlo desde postman, cambiar url2 por url
    try {
        const response = await fetch(url, { //modificar de aqui tambien
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        const result = await response.json();

        
        output.innerHTML = `
            <p class="rf"> RF: ${result.RandomForest}</p>
            <p class="svm"> SVM: ${result.SVM}</p>
        `;

    } catch (error) {
        output.innerHTML = "<p class='error'>Error conectando con la API</p>";
    }
}
</script>

</body>
</html>
